<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPA Master Study Planner</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="app-nav">
        <div class="nav-links">
            <button class="nav-btn active" id="tab-tasks" onclick="showTab('tasks')">Tasks</button>
            <button class="nav-btn" id="tab-summary" onclick="showTab('summary')">Summary</button>
            <button class="nav-btn" id="tab-import" onclick="showTab('import')">Import</button>
            <button class="nav-btn" id="tab-deleted" onclick="showTab('deleted')">Trash</button>
        </div>
    </nav>

    <header class="app-header" id="header-filter">
        <div class="filter-wrapper">
            <select id="category-dropdown" onchange="renderTasks()">
                <option value="TODAY"> TODAY </option>
                <option value="簿記">簿記</option>
                <option value="財務">財務</option>
                <option value="管理">管理</option>
                <option value="監査">監査</option>
                <option value="企業">企業</option>
            </select>
        </div>
        <div id="bulk-action-bar" style="display: none; margin-top: 15px;">
            <button class="btn-secondary" onclick="selectAllTasks()">Select All</button>
            <button class="btn-danger" onclick="bulkDelete()">Delete Selected</button>
        </div>
    </header>

    <main class="content-area">
        <section id="tasks-view">
            <ul id="task-list"></ul>
        </section>

        <section id="summary-view" style="display: none;">
            <div class="panel">
                <h3>Study Analytics</h3>
                <div class="chart-wrapper"><canvas id="studyChart"></canvas></div>
                <div id="stats-summary">Total Study Time: <span id="total-hours">0.0</span> hours</div>
            </div>
        </section>

        <section id="import-view" style="display: none;">
            <div class="panel">
                <h3>Bulk Task Import</h3>
                <p>Upload a CSV with: <i>task_name, category, due_date (YYMMDD)</i></p>
                <input type="file" id="csv-file-input" accept=".csv" onchange="importCSV(event)"
                    style="margin: 20px 0;">

                <hr style="margin: 30px 0; border: 0; border-top: 1px dashed #ccc;">
                <h3 style="color: #F44336;">Nuclear Option</h3>
                <p style="font-size: 12px; color: #666;">Delete all data and start completely fresh.</p>
                <button class="btn-danger" onclick="fullReset()" style="width: 100%; margin-top: 15px;">WIPE ALL
                    DATA</button>
            </div>
        </section>

        <section id="deleted-view" style="display: none;">
            <ul id="deleted-list"></ul>
        </section>
    </main>

    <footer class="smart-input-bar">
        <div class="input-wrapper">
            <input type="text" id="task-input" placeholder="Task name + YYMMDD shorthand (e.g. 連結会計 260315)">
            <button id="add-task-btn" onclick="addTask()">Add</button>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
