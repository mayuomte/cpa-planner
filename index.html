<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPA Master Study Planner</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="app-nav">
        <div class="nav-links">
            <button class="nav-btn active" id="tab-tasks" onclick="showTab('tasks')">task</button>
            <button class="nav-btn" id="tab-calendar" onclick="showTab('calendar')">cal</button>
            <button class="nav-btn" id="tab-summary" onclick="showTab('summary')">summary</button>
            <button class="nav-btn" id="tab-import" onclick="showTab('import')">import</button>
            <button class="nav-btn" id="tab-deleted" onclick="showTab('deleted')">🗑️</button>
        </div>
    </nav>

    <header class="app-header" id="header-filter">
        <div class="filter-wrapper">
            <select id="category-dropdown" onchange="renderTasks()">
                <option value="TODAY"> TODAY </option>
                <option value="簿記">簿記</option>
                <option value="財務">財務</option>
                <option value="管理">管理</option>
                <option value="監査">監査</option>
                <option value="企業">企業</option>
            </select>
        </div>
    </header>

    <main class="content-area">
        <section id="tasks-view">
            <ul id="task-list"></ul>
        </section>

        <section id="calendar-view" style="display: none;">
            <div class="calendar-controls">
                <button class="btn-icon" onclick="changeMonth(-1)">◀</button>
                <h3 id="calendar-month-year"></h3>
                <button class="btn-icon" onclick="changeMonth(1)">▶</button>
            </div>
            <div class="calendar-grid-header">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
        </section>

        <section id="summary-view" style="display: none;">
            <div class="panel">
                <h3>Study Analytics</h3>
                <div class="chart-wrapper"><canvas id="studyChart"></canvas></div>
                <div id="stats-summary">Total Study Time: <span id="total-hours">0.0</span> hours</div>
            </div>
        </section>

        <section id="import-view" style="display: none;">
            <div class="panel">
                <h3>Bulk Task Import</h3>
                <p>Upload CSV: <i>Task Name, Category, YYMMDD</i></p>
                <input type="file" id="csv-file-input" accept=".csv" onchange="importCSV(event)" style="margin: 20px 0;">
                <hr style="margin: 30px 0; border: 0; border-top: 1px dashed #ccc;">
                <h3 style="color: #F44336;">Cloud Management</h3>
                <button class="btn-danger" onclick="fullReset()" style="width: 100%; margin-top: 15px;">WIPE CLOUD DATA</button>
            </div>
        </section>

        <section id="deleted-view" style="display: none;">
            <ul id="deleted-list"></ul>
        </section>
    </main>

    <footer class="smart-input-bar">
        <div class="input-wrapper">
            <input type="text" id="task-input" placeholder="連結会計 260315">
            <button id="add-task-btn" onclick="addTask()">Add</button>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDfoJc_bKzWTJjvS3OYj2CcCu7xPmR9gqs",
            authDomain: "cpa-study-ad5b8.firebaseapp.com",
            databaseURL: "https://cpa-study-ad5b8-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "cpa-study-ad5b8",
            storageBucket: "cpa-study-ad5b8.firebasestorage.app",
            messagingSenderId: "444629295497",
            appId: "1:444629295497:web:5f382e497a3d2278f8c158",
            measurementId: "G-13J66SEEKR"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getDatabase(app);
        window.dbRef = ref;
        window.dbSet = set;
        window.dbOnValue = onValue;
    </script>
    <script src="script.js"></script>
</body>
</html>
